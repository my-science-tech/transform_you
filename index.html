<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Transform Yourself | உங்களை மாற்றுங்கள்</title>
<style>
  :root{
    --bg:#05070f;
    --panel:#0d1224e6;
    --accent:#43e8ff;
    --accent2:#ff5fae;
    --accent3:#ffd23f;
    --text:#eaf6ff;
    --muted:#8ea0c2;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0; padding:0; width:100%; height:100%; background:var(--bg); overflow:hidden; font-family:'Segoe UI', Arial, sans-serif; color:var(--text);}

  #stage{position:fixed; inset:0; width:100vw; height:100vh; overflow:hidden;}
  video#webcam{position:absolute; opacity:0; pointer-events:none; width:1px; height:1px;}
  canvas#output{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;}
  canvas#galaxyBuffer{display:none;}

  .layer{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
  .hidden{display:none !important;}

  /* ---------- Attract screen ---------- */
  #attract{background:radial-gradient(circle at 50% 30%, #14224a 0%, #05070f 70%); gap:18px;}
  #attract h1{font-size:3.2vw; margin:0; letter-spacing:2px; text-shadow:0 0 20px var(--accent);}
  #attract .ta{font-size:2.4vw; color:var(--accent3); margin:0;}
  #attract .sub{font-size:1.3vw; color:var(--muted); margin-top:10px;}
  #attract .pulse{width:120px; height:120px; border-radius:50%; border:4px solid var(--accent); margin-top:24px; animation:pulse 1.8s infinite ease-out; display:flex; align-items:center; justify-content:center; font-size:2.6vw;}
  @keyframes pulse{0%{transform:scale(0.85); box-shadow:0 0 0 0 rgba(67,232,255,0.5);} 70%{transform:scale(1); box-shadow:0 0 0 40px rgba(67,232,255,0);} 100%{transform:scale(0.85); box-shadow:0 0 0 0 rgba(67,232,255,0);}}

  /* ---------- Menu ---------- */
  #menu{background:transparent; gap:0;}
  #menu .menuHeader{position:absolute; top:3%; text-align:center;}
  #menu .menuHeader h2{margin:0; font-size:2.1vw; text-shadow:0 0 12px #000;}
  #menu .menuHeader .ta{margin:2px 0 0; font-size:1.6vw; color:var(--accent3); text-shadow:0 0 12px #000;}
  #tiles{display:flex; gap:4vw; align-items:center; justify-content:center;}
  .tile{width:19vw; height:24vw; max-width:280px; max-height:340px; background:var(--panel); border:2px solid #2a3a66; border-radius:22px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; position:relative; cursor:pointer; backdrop-filter:blur(4px); transition:transform .15s, border-color .15s;}
  .tile:active{transform:scale(0.97);}
  .tile .icon{font-size:5.4vw;}
  .tile .label-en{font-size:1.5vw; font-weight:600;}
  .tile .label-ta{font-size:1.3vw; color:var(--accent3);}
  .tile svg.ring{position:absolute; top:-2px; left:-2px; width:calc(100% + 4px); height:calc(100% + 4px); pointer-events:none;}
  .tile svg.ring circle{fill:none; stroke:var(--accent); stroke-width:5; stroke-linecap:round; stroke-dasharray:820; stroke-dashoffset:820; transform:rotate(-90deg); transform-origin:50% 50%; filter:drop-shadow(0 0 6px var(--accent));}
  .tile.hover{border-color:var(--accent);}

  /* ---------- HUD (inside modes) ---------- */
  #hud{position:absolute; inset:0; pointer-events:none;}
  #hud .top{position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:flex-start; padding:2.2%; pointer-events:none;}
  #hud .modeTitle{background:var(--panel); padding:10px 20px; border-radius:14px; border:1px solid #2a3a66;}
  #hud .modeTitle .en{font-size:1.3vw; font-weight:700;}
  #hud .modeTitle .ta{font-size:1.05vw; color:var(--accent3);}
  .btn{pointer-events:all; background:var(--panel); border:2px solid #2a3a66; color:var(--text); border-radius:16px; padding:14px 22px; font-size:1.1vw; display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; position:relative;}
  .btn .ta{font-size:0.85vw; color:var(--accent3);}
  .btn:active{transform:scale(0.96);}
  #backBtn{position:absolute; top:2.2%; left:2.2%;}
  #backBtn svg.ring circle{stroke:var(--accent2); filter:drop-shadow(0 0 6px var(--accent2));}
  #captureBtn{position:absolute; bottom:5%; left:50%; transform:translateX(-50%); pointer-events:all; width:90px; height:90px; border-radius:50%; background:radial-gradient(circle, #fff, #cfe8ff); border:5px solid var(--accent); font-size:1.8vw; display:flex; align-items:center; justify-content:center; cursor:pointer;}
  #captureBtn:active{transform:translateX(-50%) scale(0.94);}
  #captureHint{position:absolute; bottom:2%; left:50%; transform:translateX(-50%); font-size:0.95vw; color:var(--muted); text-align:center;}
  #visitorCount{position:absolute; bottom:2%; right:2.2%; background:var(--panel); border:1px solid #2a3a66; border-radius:12px; padding:8px 14px; font-size:0.95vw; pointer-events:all;}

  /* ---------- Flash + Review ---------- */
  #flash{position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:50;}
  #photoReview{background:rgba(3,5,14,0.94); z-index:60; gap:16px;}
  #photoReview img{max-width:70vw; max-height:60vh; border-radius:18px; border:3px solid var(--accent); box-shadow:0 0 40px rgba(67,232,255,0.4);}
  #photoReview .reviewBtns{display:flex; gap:20px; margin-top:10px;}

  .cursorDot{position:absolute; width:26px; height:26px; border-radius:50%; background:var(--accent); box-shadow:0 0 16px var(--accent); pointer-events:none; z-index:40; transform:translate(-50%,-50%); transition:opacity .2s;}
</style>
</head>
<body>

<div id="stage">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="output"></canvas>
  <canvas id="galaxyBuffer"></canvas>
  <div class="cursorDot hidden" id="cursorDot"></div>

  <div class="layer" id="attract">
    <h1>TRANSFORM YOURSELF</h1>
    <p class="ta">உங்களை மாற்றி பாருங்கள்</p>
    <p class="sub">Touch the screen or show your hand to begin &nbsp;•&nbsp; தொடவும் அல்லது கையை காட்டவும்</p>
    <div class="pulse">👋</div>
  </div>

  <div class="layer hidden" id="menu">
    <div class="menuHeader">
      <h2>Choose Your Transformation</h2>
      <p class="ta">உங்கள் மாற்றத்தை தேர்ந்தெடுக்கவும்</p>
    </div>
    <div id="tiles">
      <div class="tile" data-mode="thermal">
        <svg class="ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46"></circle></svg>
        <div class="icon">🌡️</div>
        <div class="label-en">Thermal Vision</div>
        <div class="label-ta">வெப்ப காட்சி</div>
      </div>
      <div class="tile" data-mode="astronaut">
        <svg class="ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46"></circle></svg>
        <div class="icon">🧑‍🚀</div>
        <div class="label-en">Astronaut Suit</div>
        <div class="label-ta">விண்வெளி உடை</div>
      </div>
      <div class="tile" data-mode="galaxy">
        <svg class="ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46"></circle></svg>
        <div class="icon">🌌</div>
        <div class="label-en">Galaxy Portal</div>
        <div class="label-ta">விண்மீன் உலகம்</div>
      </div>
